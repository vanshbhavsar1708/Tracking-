<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
<title>PIXEL PLUMBER RUSH</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
:root{--font-display:'Cabinet Grotesk','Inter',sans-serif;--font-body:'Satoshi','Inter',sans-serif;--bg:#050814;--surface:rgba(10,18,34,.72);--surface2:rgba(19,30,54,.76);--line:rgba(128,181,255,.18);--text:#eef4ff;--muted:#9fb4d8;--primary:#7bc2ff}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0}body{overflow:hidden;touch-action:none;background:radial-gradient(circle at top,rgba(68,122,255,.12),transparent 35%),var(--bg);color:var(--text);font-family:var(--font-body)}
#game{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
video{position:absolute;right:.8rem;bottom:.8rem;width:180px;height:102px;object-fit:cover;border-radius:.8rem;border:1px solid var(--line);transform:scaleX(-1);z-index:3;display:none}
.overlay{position:absolute;inset:0;z-index:4;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:1rem;gap:.6rem}
.row{display:flex;justify-content:space-between;gap:.6rem;flex-wrap:wrap}.panel{pointer-events:auto;background:var(--surface);border:1px solid var(--line);border-radius:.8rem;padding:.8rem}
.brand{flex:1 1 100%;display:flex;gap:.7rem;align-items:center}.brand img{width:42px;height:42px;border-radius:.6rem;border:1px solid rgba(255,255,255,.2)}
.eyebrow{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}h1{margin:.1rem 0;font-size:1.5rem;font-family:var(--font-display)}.meta{margin:0;color:var(--muted);font-size:.86rem}
.hud{display:grid;grid-template-columns:repeat(6,minmax(64px,1fr));gap:.4rem;min-width:min(100%,760px)}.stat{min-height:58px;padding:.35rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:.6rem;text-align:center;display:flex;flex-direction:column;justify-content:center}
.label{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.value{font-size:1rem;font-weight:700;white-space:nowrap;min-height:1.2em;font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}
button{min-height:42px;padding:.55rem .95rem;border-radius:999px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font:inherit;cursor:pointer}
button:hover{background:rgba(123,194,255,.16)}.primary{background:var(--primary);color:#04101f;border-color:transparent}
.centerMessage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;background:rgba(8,14,28,.86);border:1px solid var(--line);border-radius:.8rem;padding:1rem;max-width:min(92vw,34rem);text-align:center}
.centerMessage[hidden]{display:none}
.modePicker{position:absolute;inset:0;z-index:7;background:rgba(2,8,16,.72);display:flex;align-items:center;justify-content:center;padding:1rem}
.modeCard{width:min(94vw,560px);background:rgba(8,16,30,.9);border:1px solid var(--line);border-radius:.8rem;padding:1rem;text-align:center}
.modeButtons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem;margin-top:.7rem}
.touchControls{position:absolute;left:.8rem;bottom:calc(5.3rem + env(safe-area-inset-bottom));display:flex;gap:.5rem;z-index:5;pointer-events:auto}
.touchControls button{width:62px;height:62px;padding:0;border-radius:50%;font-weight:700}
@media(max-width:760px){.hud{grid-template-columns:repeat(3,minmax(0,1fr))}.actions{justify-content:stretch}.actions button{flex:1 1 calc(50% - .3rem)}.touchControls{left:.6rem}.modeButtons{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<video id="vid" playsinline muted></video>

<div class="overlay">
  <div class="row">
    <section class="panel brand">
      <img src="logo.png" alt="CreativeCAT logo"/>
      <div>
        <div class="eyebrow">CreativeCAT by Vansh Bhavsar</div>
        <h1>PIXEL PLUMBER RUSH</h1>
        <p class="meta">Retro platform run with coins, stomps, and finish-flag races.</p>
      </div>
    </section>
    <section class="panel hud">
      <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">Coins</div><div class="value" id="coins">0</div></div>
      <div class="stat"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
      <div class="stat"><div class="label">Status</div><div class="value" id="status">Mode</div></div>
      <div class="stat"><div class="label">Mode</div><div class="value" id="mode">None</div></div>
      <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
    </section>
  </div>
  <div class="row">
    <section class="panel actions" id="actionPanel">
      <button id="restartBtn" class="primary" type="button">Restart</button>
      <button id="fullscreenBtn" type="button">Fullscreen</button>
      <button id="homeBtn" type="button">Home</button>
    </section>
  </div>
</div>

<div id="touchControls" class="touchControls">
  <button id="leftBtn" type="button">&#9664;</button>
  <button id="jumpBtn" type="button">&#9650;</button>
  <button id="rightBtn" type="button">&#9654;</button>
</div>

<div id="modePicker" class="modePicker">
  <section class="modeCard">
    <h2>Select Control Mode</h2>
    <p>Choose how you want to play.</p>
    <div class="modeButtons">
      <button id="standardModeBtn" class="primary" type="button">Standard Mode</button>
      <button id="fingerModeBtn" type="button">Finger Tracking Mode</button>
    </div>
  </section>
</div>
<div id="message" class="centerMessage"><h2>Pick a mode</h2><p>Choose Standard Mode or Finger Tracking Mode.</p></div>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),vid=document.getElementById('vid');
const scoreEl=document.getElementById('score'),coinsEl=document.getElementById('coins'),livesEl=document.getElementById('lives'),statusEl=document.getElementById('status'),modeEl=document.getElementById('mode'),levelEl=document.getElementById('level');
const messageEl=document.getElementById('message'),modePicker=document.getElementById('modePicker');
const restartBtn=document.getElementById('restartBtn'),fullscreenBtn=document.getElementById('fullscreenBtn'),homeBtn=document.getElementById('homeBtn');
const standardModeBtn=document.getElementById('standardModeBtn'),fingerModeBtn=document.getElementById('fingerModeBtn');
const actionPanel=document.getElementById('actionPanel');
const touchControls=document.getElementById('touchControls'),leftBtn=document.getElementById('leftBtn'),rightBtn=document.getElementById('rightBtn'),jumpBtn=document.getElementById('jumpBtn');

let cw=0,ch=0,lastTime=0,controlMode=null,handVisible=false,hands=null,camera=null,fingerX=0,fingerY=0,fingerPrevY=0,lastFingerJump=0;
let started=false,gameOver=false,score=0,coins=0,lives=3,level=1,cameraX=0;
const keys={left:false,right:false,jump:false,jumpPressed:false};

const gravity=0.55,runSpeed=4.2,jumpPower=11.8;
const player={x:70,y:0,w:30,h:36,vx:0,vy:0,onGround:false,invuln:0,face:1};
let worldW=4200;
let platforms=[],enemies=[],coinItems=[],flag={x:0,w:24,h:150,reached:false};

function resize(){cw=canvas.width=innerWidth;ch=canvas.height=innerHeight;}

function buildLevel(){
  platforms=[
    {x:0,y:ch-70,w:850,h:80},
    {x:920,y:ch-110,w:260,h:120},
    {x:1280,y:ch-150,w:230,h:160},
    {x:1600,y:ch-95,w:310,h:105},
    {x:2060,y:ch-125,w:230,h:135},
    {x:2460,y:ch-175,w:270,h:185},
    {x:2880,y:ch-95,w:320,h:105},
    {x:3340,y:ch-130,w:280,h:140},
    {x:3720,y:ch-70,w:500,h:80}
  ];
  enemies=[
    {x:1080,y:ch-160,w:28,h:28,vx:1.4,alive:true},
    {x:1710,y:ch-145,w:28,h:28,vx:-1.6,alive:true},
    {x:2590,y:ch-225,w:28,h:28,vx:1.3,alive:true},
    {x:3430,y:ch-160,w:28,h:28,vx:-1.8,alive:true}
  ];
  coinItems=[];
  for(let i=0;i<18;i++){
    const x=240+i*210+Math.random()*46,y=ch-220-Math.random()*120;
    coinItems.push({x,y,r:10,taken:false,pulse:Math.random()*10});
  }
  flag={x:worldW-180,w:24,h:150,reached:false};
}

function resetGame(){
  score=0;coins=0;lives=3;level=1;gameOver=false;started=false;
  player.x=70;player.y=ch-200;player.vx=0;player.vy=0;player.onGround=false;player.invuln=0;
  cameraX=0;buildLevel();updateHud();
  if(controlMode==='laptop')showMessage('Show your hand','Move your index finger left/right. Lift hand quickly to jump.');
  else if(controlMode==='standard')showMessage('Standard mode','Use arrow keys or on-screen controls to move and jump.');
  else showMessage('Pick a mode','Choose Standard Mode or Finger Tracking Mode.');
}

function updateHud(){
  scoreEl.textContent=String(Math.floor(score));
  coinsEl.textContent=String(coins);
  livesEl.textContent=String(lives);
  levelEl.textContent=String(level);
  statusEl.textContent=gameOver?'Game Over':flag.reached?'Cleared':started?(controlMode==='laptop'?(handVisible?'Tracking':'Searching'):'Running'):'Ready';
  modeEl.textContent=controlMode==='laptop'?'Finger Tracking':controlMode==='standard'?'Standard':'None';
}

function updateTouchControlsLayout(){
  if(controlMode!=='standard'){return;}
  const isCompact=innerWidth<=760;
  if(!isCompact){
    touchControls.style.bottom='calc(5.3rem + env(safe-area-inset-bottom))';
    return;
  }
  const rect=actionPanel.getBoundingClientRect();
  const bottomOffset=Math.max(18,Math.ceil(innerHeight-rect.top+12));
  touchControls.style.bottom=`calc(${bottomOffset}px + env(safe-area-inset-bottom))`;
}

function showMessage(t,x){messageEl.hidden=false;messageEl.innerHTML='<h2>'+t+'</h2><p>'+x+'</p>';}
function hideMessage(){if(started&&!gameOver)messageEl.hidden=true;}

function aabb(a,b){return a.x<a.x+a.w&&a.x+a.w>b.x&&a.y<a.y+a.h&&a.y+a.h>b.y;}
function intersects(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function applyInput(){
  let move=0;
  if(controlMode==='standard'){
    if(keys.left)move-=1;
    if(keys.right)move+=1;
  }else if(controlMode==='laptop'&&handVisible){
    const target=(fingerX/cw)*2-1;
    move=Math.abs(target)<0.18?0:target;
  }
  player.vx=move*runSpeed;
  if(move!==0)player.face=move<0?-1:1;
  if(keys.jumpPressed&&player.onGround){
    player.vy=-jumpPower;player.onGround=false;
    keys.jumpPressed=false;
  }
}

function handlePhysics(){
  player.invuln=Math.max(0,player.invuln-1/60);
  player.vy+=gravity;
  player.x+=player.vx;
  player.y+=player.vy;
  player.onGround=false;

  for(const p of platforms){
    if(!intersects(player,p))continue;
    const prevY=player.y-player.vy;
    if(prevY+player.h<=p.y+2&&player.vy>=0){
      player.y=p.y-player.h;player.vy=0;player.onGround=true;
    }else if(prevY>=p.y+p.h-2&&player.vy<0){
      player.y=p.y+p.h;player.vy=0;
    }else{
      if(player.x+player.w/2<p.x+p.w/2)player.x=p.x-player.w;
      else player.x=p.x+p.w;
    }
  }

  if(player.y>ch+130){
    lives-=1;
    if(lives<=0){gameOver=true;showMessage('Run Over','You fell too many times. Tap Restart.');}
    else {player.x=Math.max(70,cameraX+70);player.y=ch-240;player.vy=0;player.invuln=2;}
    updateHud();
  }

  player.x=Math.max(0,Math.min(worldW-player.w,player.x));
  cameraX=Math.max(0,Math.min(worldW-cw,player.x-cw*0.35));
}

function updateCoins(){
  for(const c of coinItems){
    if(c.taken)continue;
    c.pulse+=0.08;
    const cx=c.x-player.x,cy=c.y-player.y;
    if(Math.hypot(cx,cy)<20){
      c.taken=true;coins+=1;score+=25;updateHud();
    }
  }
}

function updateEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    e.x+=e.vx;
    let supported=false;
    for(const p of platforms){
      if(e.x+e.w>p.x&&e.x<p.x+p.w&&Math.abs((e.y+e.h)-p.y)<3){supported=true;if(e.x<p.x||e.x+e.w>p.x+p.w)e.vx*=-1;}
    }
    if(!supported)e.vx*=-1;
    if(intersects(player,e)){
      if(player.vy>1&&player.y+player.h-6<e.y+8){
        e.alive=false;player.vy=-8.2;score+=100;updateHud();
      }else if(player.invuln<=0){
        lives-=1;player.invuln=2.2;player.vx=-player.face*6;player.vy=-6;
        if(lives<=0){gameOver=true;showMessage('Run Over','Enemies got you. Tap Restart.');}
        updateHud();
      }
    }
  }
}

function checkFlag(){
  if(flag.reached||gameOver)return;
  if(player.x+player.w>flag.x){
    flag.reached=true;score+=300;updateHud();
    showMessage('Level Cleared','Great run. Tap Restart to play again.');
  }
}

function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,ch);
  sky.addColorStop(0,'#85c5ff');sky.addColorStop(1,'#bde4ff');
  ctx.fillStyle=sky;ctx.fillRect(0,0,cw,ch);
  ctx.fillStyle='rgba(255,255,255,.55)';
  for(let i=0;i<6;i++){
    const x=((i*360-cameraX*0.25)%(cw+220))+40,y=55+(i%3)*44;
    ctx.beginPath();ctx.arc(x,y,26,0,Math.PI*2);ctx.arc(x+28,y+2,18,0,Math.PI*2);ctx.arc(x-24,y+4,18,0,Math.PI*2);ctx.fill();
  }
}

function drawWorld(){
  ctx.save();ctx.translate(-cameraX,0);
  for(const p of platforms){
    ctx.fillStyle='#78bd4f';ctx.fillRect(p.x,p.y,p.w,20);
    ctx.fillStyle='#8d5a3a';ctx.fillRect(p.x,p.y+20,p.w,p.h-20);
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.strokeRect(p.x,p.y,p.w,p.h);
  }
  for(const c of coinItems){
    if(c.taken)continue;
    const bob=Math.sin(c.pulse)*3;
    ctx.fillStyle='#ffd665';ctx.beginPath();ctx.arc(c.x,c.y+bob,c.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#b88722';ctx.stroke();
  }
  for(const e of enemies){
    if(!e.alive)continue;
    ctx.fillStyle='#d16f42';ctx.fillRect(e.x,e.y,e.w,e.h);
    ctx.fillStyle='#231c16';ctx.fillRect(e.x+5,e.y+8,6,6);ctx.fillRect(e.x+17,e.y+8,6,6);
  }
  ctx.fillStyle='#f7f9ff';
  ctx.fillRect(flag.x,flag.y-flag.h,flag.w,flag.h);
  ctx.fillStyle=flag.reached?'#7fd58e':'#ff8678';
  ctx.fillRect(flag.x+flag.w,flag.y-flag.h+12,46,28);
  ctx.restore();
}

function drawPlayer(){
  ctx.save();ctx.translate(player.x-cameraX,player.y);
  if(player.invuln>0&&Math.floor(performance.now()/80)%2===0){ctx.globalAlpha=.4;}
  ctx.fillStyle='#2d58d9';ctx.fillRect(5,12,20,24);
  ctx.fillStyle='#ff584e';ctx.fillRect(2,0,26,14);
  ctx.fillStyle='#ffd7b0';ctx.fillRect(9,14,12,11);
  ctx.fillStyle='#2e2e2e';ctx.fillRect(player.face===1?16:12,18,4,4);
  ctx.fillStyle='#7b3f22';ctx.fillRect(5,33,8,3);ctx.fillRect(17,33,8,3);
  ctx.restore();
}

function tick(ts){
  const dt=Math.min(.04,(ts-lastTime)/1000||.016);lastTime=ts;
  if(controlMode&&(controlMode==='standard'||(controlMode==='laptop'&&handVisible))&&!started&&!gameOver){started=true;hideMessage();updateHud();}
  if(started&&!gameOver&&!flag.reached){
    applyInput();
    handlePhysics();
    updateCoins();
    updateEnemies();
    checkFlag();
    score+=dt*3;
    updateHud();
  }
  drawBackground();
  drawWorld();
  drawPlayer();
  requestAnimationFrame(tick);
}

function updateHand(results){
  if(controlMode!=='laptop')return;
  if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){handVisible=false;updateHud();return;}
  const tip=results.multiHandLandmarks[0][8];
  handVisible=true;
  fingerX=(1-tip.x)*cw;fingerY=tip.y*ch;
  const now=performance.now();
  if(fingerPrevY===0)fingerPrevY=fingerY;
  if(fingerPrevY-fingerY>22&&now-lastFingerJump>380){keys.jumpPressed=true;lastFingerJump=now;}
  fingerPrevY=fingerY;
}

async function startFingerTracking(){
  if(!hands){
    hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.6});
    hands.onResults(updateHand);
  }
  if(!camera){
    camera=new Camera(vid,{onFrame:async()=>{if(controlMode==='laptop')await hands.send({image:vid});},width:640,height:480});
  }
  vid.style.display='block';
  await camera.start();
}

async function switchMode(mode){
  controlMode=mode;modePicker.style.display='none';
  modeEl.textContent=mode==='standard'?'Standard':'Finger Tracking';
  touchControls.style.display=mode==='standard'?'flex':'none';
  if(mode==='laptop'){
    try{await startFingerTracking();}
    catch(_e){controlMode=null;modePicker.style.display='flex';showMessage('Camera blocked','Allow camera access and choose Finger Tracking Mode again.');modeEl.textContent='None';return;}
  }else{
    if(camera)camera.stop();
    vid.style.display='none';
    handVisible=false;
  }
  updateTouchControlsLayout();
  resetGame();
}

function setBtn(el,key,val){
  el.addEventListener('pointerdown',e=>{keys[key]=val; if(key==='jump'&&val)keys.jumpPressed=true; e.preventDefault();},{passive:false});
  const off=()=>{if(key!=='jump')keys[key]=false;};
  el.addEventListener('pointerup',off,{passive:true});
  el.addEventListener('pointercancel',off,{passive:true});
  el.addEventListener('pointerleave',off,{passive:true});
}

addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=true;
  if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW')keys.jumpPressed=true;
});
addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;
});

setBtn(leftBtn,'left',true);setBtn(rightBtn,'right',true);setBtn(jumpBtn,'jump',true);

standardModeBtn.addEventListener('click',()=>switchMode('standard'));
fingerModeBtn.addEventListener('click',()=>switchMode('laptop'));
restartBtn.addEventListener('click',resetGame);
fullscreenBtn.addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});});
homeBtn.addEventListener('click',()=>{location.href='index.html';});
addEventListener('resize',()=>{resize();buildLevel();updateTouchControlsLayout();});

resize();buildLevel();touchControls.style.display='none';updateHud();requestAnimationFrame(tick);
</script>
</body>
</html>
